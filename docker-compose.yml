version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-ecouser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ecotrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: eco_backend_v4
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  frontend:
    build: ./frontend
    container_name: eco_frontend_v4
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - ./backend/data:/app/data
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    restart: always

volumes:
  pgdata:

networks:
  default:
    driver: bridge